server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # Auction WebSocket (notification service)
    location ~ ^/auctions/[^/]+/subscribe {
        proxy_pass         http://notification:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }

    # Metrics (notification service)
    location /metrics {
        proxy_pass http://notification:8080;
    }

    # Auth + Users (user service)
    location /auth {
        proxy_pass http://user:8082;
    }

    location /users {
        proxy_pass http://user:8082;
    }

    # Shops + Items + Sellers (shop service)
    location /shops {
        proxy_pass http://shop:8083;
    }

    location /items {
        proxy_pass http://shop:8083;
    }

    location /sellers {
        proxy_pass http://shop:8083;
    }

    # Bids (bid service)
    location /bids {
        proxy_pass http://bid:8084;
    }

    # Payments (payment service)
    location /payments {
        proxy_pass http://payment:8085;
    }

    # Auctions (auction service)
    location /auctions {
        proxy_pass http://auction:8081;
    }

    # Block browser metadata requests from hitting the SPA fallback
    location /.well-known/ {
        return 404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
